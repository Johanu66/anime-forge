experiment_name: ugatit_selfie2anime
model_name: ugatit
mode: ugatit
seed: 42
data:
  root: data/selfie2anime/unpaired
  image_size: 512
  num_workers: 2
  batch_size: 8
  augment:
    random_horizontal_flip: true
    color_jitter: 0.05
    random_crop: true
  unpaired_layout:
    train_a: trainA
    train_b: trainB
    test_a: testA
    test_b: testB
train:
  epochs: 260
  decay_start_epoch: 130
  lr: 8.0e-05
  beta1: 0.5
  beta2: 0.999
  lambda_cycle: 12.0
  lambda_identity: 8.0
  lambda_cam: 800.0
  sample_interval: 10
  mixed_precision: true
  weight_decay: 0.0001
runtime:
  output_dir: outputs/ugatit_modal_b200_balanced_v1
  checkpoint_dir: checkpoints/ugatit_modal_b200_balanced_v1
  resume_checkpoint: null
model:
  ugatit:
    num_blocks: 6
